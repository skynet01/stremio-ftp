services:
  stremio-ftp:
    build: .
    ports:
      - "7000:7000"
    environment:
      BASE_URL: "${BASE_URL:?set BASE_URL}"
      CONFIG_ENCRYPTION_KEY: "${CONFIG_ENCRYPTION_KEY:?set CONFIG_ENCRYPTION_KEY}"
      PORT: "7000"
      CONFIG_DIR: "/config"
      FTP_MAX_CONNECTIONS: "${FTP_MAX_CONNECTIONS:-4}"
      SETUP_TOKEN: "${SETUP_TOKEN:-}"
      ALLOW_PUBLIC_PROFILE_API: "${ALLOW_PUBLIC_PROFILE_API:-false}"
      TMDB_API_KEY: "${TMDB_API_KEY:-}"
      SCAN_GLOBAL_CONCURRENCY: "${SCAN_GLOBAL_CONCURRENCY:-2}"
      SCAN_QUEUE_MAX: "${SCAN_QUEUE_MAX:-50}"
      SCAN_COOLDOWN_MS: "${SCAN_COOLDOWN_MS:-900000}"
      SCAN_JOB_TIMEOUT_MS: "${SCAN_JOB_TIMEOUT_MS:-1800000}"
      SCAN_SCHEDULER_INTERVAL_MS: "${SCAN_SCHEDULER_INTERVAL_MS:-60000}"
      SCAN_PROGRESS_AVERAGE_ITEMS: "${SCAN_PROGRESS_AVERAGE_ITEMS:-2000}"
    volumes:
      - stremio-ftp-config:/config
    restart: unless-stopped

volumes:
  stremio-ftp-config:
